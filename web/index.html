<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerospace Trajectory Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Standard Corporate/Academic UI Variables */
        :root { 
            --bg-color: #f4f6f8; 
            --panel-bg: #ffffff; 
            --text-main: #333333;
            --text-muted: #666666;
            --primary-blue: #0056b3;
            --border-color: #e2e8f0;
        }
        
        body, html { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; 
        }
        
        #dashboard { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #sidebar { 
            width: 340px; background: var(--panel-bg); 
            border-right: 1px solid var(--border-color); 
            padding: 24px; box-sizing: border-box;
            display: flex; flex-direction: column;
            overflow-y: auto; z-index: 10;
            box-shadow: 2px 0 8px rgba(0,0,0,0.03);
        }

        #main-view { 
            flex-grow: 1; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }
        
        .viewport-container { 
            flex: 1.5; position: relative; border-bottom: 1px solid var(--border-color); 
            min-height: 200px; background: #e6f3ff; transition: background 0.5s ease;
        }
        
        #flightCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        
        .chart-section { 
            flex: 1; position: relative; padding: 20px; 
            background: var(--panel-bg); min-height: 0; box-sizing: border-box;
        }
        
        .chart-wrapper { position: relative; height: 100%; width: 100%; }

        .sidebar-header { margin: 0 0 20px 0; font-size: 1.2rem; font-weight: 600; color: var(--text-main); }
        
        .input-group { 
            margin-bottom: 16px; border: 1px solid var(--border-color); 
            padding: 12px; background: #fafbfc; border-radius: 6px; 
        }
        
        .input-group h3 { 
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; 
            margin: 0 0 12px 0; color: var(--text-muted); 
            border-bottom: 1px solid var(--border-color); padding-bottom: 6px;
        }
        
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .control-row label { font-size: 0.85rem; color: var(--text-main); }
        .control-row input { 
            background: #fff; border: 1px solid #cbd5e1; color: var(--text-main); 
            width: 80px; padding: 4px 8px; font-size: 0.85rem; text-align: right;
            border-radius: 4px;
        }
        .control-row input:focus { outline: none; border-color: var(--primary-blue); }

        .btn-primary { 
            background: var(--primary-blue); color: #fff; border: none; 
            padding: 10px; font-weight: 500; font-size: 0.95rem; cursor: pointer; 
            margin-top: 15px; border-radius: 6px; transition: background 0.2s;
        }
        .btn-primary:hover { background: #004494; }
        
        .btn-secondary { 
            background: #f1f5f9; border: 1px solid #cbd5e1; color: var(--text-main); 
            padding: 8px; font-size: 0.85rem; cursor: pointer; margin-top: 8px; 
            border-radius: 6px; transition: background 0.2s;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .stat-card { border: 1px solid var(--border-color); padding: 10px; background: #fff; border-radius: 6px; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="sidebar">
        <h2 class="sidebar-header">Flight Configuration</h2>
        
        <div class="input-group">
            <h3>Environment</h3>
            <div class="control-row"><label>Launch Angle (°)</label><input type="number" id="init_angle" value="88"></div>
            <div class="control-row"><label>Initial Velocity (m/s)</label><input type="number" id="init_v" value="100"></div>
            <div class="control-row"><label>Drag Coefficient</label><input type="number" id="drag_cd" value="0.40" step="0.01"></div>
        </div>

        <div class="input-group">
            <h3>Stage 1 (Booster)</h3>
            <div class="control-row"><label>Thrust (N)</label><input type="number" id="s1_thrust" value="950000"></div>
            <div class="control-row"><label>Fuel Mass (kg)</label><input type="number" id="s1_fuel" value="40000"></div>
            <div class="control-row"><label>Dry Mass (kg)</label><input type="number" id="s1_dry" value="10000"></div>
        </div>

        <div class="input-group">
            <h3>Stage 2 (Orbiter)</h3>
            <div class="control-row"><label>Thrust (N)</label><input type="number" id="s2_thrust" value="210000"></div>
            <div class="control-row"><label>Fuel Mass (kg)</label><input type="number" id="s2_fuel" value="12000"></div>
            <div class="control-row"><label>Dry Mass (kg)</label><input type="number" id="s2_dry" value="2500"></div>
        </div>

        <div class="stat-card" style="margin-top: 10px;">
            <div class="stat-label">System Status</div>
            <div id="status" class="stat-value" style="color:#64748b;">Ready</div>
        </div>
        
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Altitude (m)</div><div id="alt" class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">Velocity (m/s)</div><div id="vel" class="stat-value">0</div></div>
        </div>
        
        <button class="btn-primary" onclick="startSimulation()">Run Simulation</button>
        <button class="btn-secondary" onclick="exportData()">Export Data (.txt)</button>
    </div>

    <div id="main-view">
        <div class="viewport-container" id="sky">
            <canvas id="flightCanvas"></canvas>
        </div>
        <div class="chart-section">
            <div class="chart-wrapper">
                <canvas id="telemetryChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    const telChartCtx = document.getElementById('telemetryChart').getContext('2d');
    const sky = document.getElementById('sky');

    let isRunning = false;
    let path = [];
    let config = {};

    // Standard styling for Chart.js
    const telChart = new Chart(telChartCtx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Velocity (m/s)', data: [], borderColor: '#0056b3', backgroundColor: 'rgba(0, 86, 179, 0.1)', borderWidth: 2, fill: true, pointRadius: 0 }] },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            animation: false, 
            scales: { 
                x: { display: false }, 
                y: { grid: { color: '#e2e8f0' } } 
            }, 
            plugins: { legend: { display: false } } 
        }
    });

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function formatNumber(num) {
        if (num > 9999999) return num.toExponential(2);
        return Math.floor(num).toLocaleString();
    }

    function startSimulation() {
        if(isRunning) return;
        
        resizeCanvas();

        const angle = parseFloat(document.getElementById('init_angle').value) * (Math.PI / 180);
        const v0 = parseFloat(document.getElementById('init_v').value);
        
        config = {
            s1: { thrust: parseFloat(document.getElementById('s1_thrust').value), fuel: parseFloat(document.getElementById('s1_fuel').value), dry: parseFloat(document.getElementById('s1_dry').value), flow: 550 },
            s2: { thrust: parseFloat(document.getElementById('s2_thrust').value), fuel: parseFloat(document.getElementById('s2_fuel').value), dry: parseFloat(document.getElementById('s2_dry').value), flow: 110 },
            cd: parseFloat(document.getElementById('drag_cd').value),
            state: { t:0, x:0, y:0, vx: v0 * Math.cos(angle), vy: v0 * Math.sin(angle), stage: 1 }
        };

        isRunning = true;
        path = [];
        telChart.data.labels = [];
        telChart.data.datasets[0].data = [];
        
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Running";
        statusEl.style.color = "#16a34a"; // Standard green
        
        animate();
    }

    function animate() {
        if (!isRunning) return;

        const dt = 0.15;
        const EarthR = 6371000;
        const GM = 3.986e14;
        const s = config.state;
        
        let currentMass = config.s2.dry + config.s2.fuel + (s.stage === 1 ? config.s1.dry + config.s1.fuel : 0);
        let thrust = s.stage === 1 ? config.s1.thrust : (config.s2.fuel > 0 ? config.s2.thrust : 0);
        let speed = Math.sqrt(s.vx**2 + s.vy**2);
        
        let gravity = GM / Math.pow(EarthR + s.y, 2);
        let rho = s.y > 100000 ? 0 : 1.225 * Math.exp(-s.y / 8500); 
        let drag = 0.5 * rho * speed**2 * config.cd * (s.stage === 1 ? 4.5 : 2.0);

        let ax = (thrust * (s.vx/speed) - drag * (s.vx/speed)) / currentMass;
        let ay = ((thrust * (s.vy/speed) - drag * (s.vy/speed)) / currentMass) - gravity;

        if (isNaN(ax) || isNaN(ay)) { isRunning = false; return; }

        s.vx += ax * dt; s.vy += ay * dt; s.x += s.vx * dt; s.y += s.vy * dt; s.t += dt;

        if(s.stage === 1) { config.s1.fuel -= config.s1.flow * dt; if(config.s1.fuel <= 0) s.stage = 2; }
        else if(config.s2.fuel > 0) config.s2.fuel -= config.s2.flow * dt;

        document.getElementById('alt').innerText = formatNumber(s.y);
        document.getElementById('vel').innerText = formatNumber(speed);

        // Standard daytime sky transition to space
        let skyAlt = Math.min(Math.max(s.y / 80000, 0), 1);
        sky.style.background = `linear-gradient(to top, rgba(230, 243, 255, ${1-skyAlt}) 0%, rgba(10, 20, 40, ${skyAlt}) 100%)`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        path.push({x: s.x, y: s.y});
        
        let maxX = Math.max(...path.map(p => Math.abs(p.x)), 10); 
        let maxY = Math.max(...path.map(p => p.y), 10); 
        const padX = 40;
        const padY = 40;
        
        const scaleX = (canvas.width - padX * 2) / maxX;
        const scaleY = (canvas.height - padY * 2) / maxY;

        ctx.strokeStyle = '#0056b3'; // Standard blue path
        ctx.lineWidth = 2; 
        ctx.beginPath();
        path.forEach((p, i) => {
            const dx = padX + (p.x * scaleX);
            const dy = (canvas.height - padY) - (p.y * scaleY);
            if(i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
        });
        ctx.stroke();

        if(Math.round(s.t * 10) % 10 === 0) {
            telChart.data.labels.push(s.t.toFixed(0));
            telChart.data.datasets[0].data.push(speed);
            telChart.update('none');
        }

        let escapeV = Math.sqrt(2 * GM / (EarthR + s.y));
        const statusEl = document.getElementById('status');

        if (s.y < -10 && s.t > 1) { 
            isRunning = false; 
            statusEl.innerText = "Complete - Impact"; 
            statusEl.style.color = "#475569";
        } else if (speed >= 299792458) { 
            isRunning = false; 
            statusEl.innerText = "Error: Physics Limit"; 
            statusEl.style.color = "#dc2626";
        } else if (speed > escapeV && s.t > 50) {
            isRunning = false; 
            statusEl.innerText = "Escaped Gravity Well"; 
            statusEl.style.color = "#0284c7";
        }

        if(isRunning) requestAnimationFrame(animate);
    }

    function exportData() {
        const data = `Aerospace Trajectory Calculator - Export\n---------------------------\nStage 1 Thrust: ${document.getElementById('s1_thrust').value} N\nStage 2 Thrust: ${document.getElementById('s2_thrust').value} N\nDrag Coefficient: ${document.getElementById('drag_cd').value}\nInitial Velocity: ${document.getElementById('init_v').value} m/s\nLaunch Angle: ${document.getElementById('init_angle').value}°\n---------------------------\nTimestamp: ${new Date().toISOString()}`;
        const blob = new Blob([data], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'trajectory_config.txt'; a.click();
    }
</script>
</body>
</html>
