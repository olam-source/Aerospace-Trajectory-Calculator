<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAT-F | Professional Mission Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #0b0e14; --panel: #151921; }
        body, html { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; 
        }
        #dashboard { display: flex; height: 100vh; width: 100vw; }
        #sidebar { 
            width: 350px; background: var(--panel); 
            border-right: 2px solid var(--neon); 
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
            overflow-y: auto;
        }
        #main-view { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        .viewport-container { 
            flex: 1.5; position: relative; border-bottom: 1px solid #333; 
            min-height: 0; background: #000; transition: background 2s;
        }
        .chart-section { flex: 1; position: relative; padding: 10px; background: #080a0f; min-height: 0; }
        .input-group { margin-bottom: 12px; border: 1px solid #222; padding: 8px; background: rgba(0,0,0,0.3); }
        .input-group h3 { font-size: 0.75rem; margin: 0 0 8px 0; color: #666; border-bottom: 1px solid #222; }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .control-row label { font-size: 0.65rem; color: #aaa; }
        .control-row input { 
            background: #000; border: 1px solid var(--neon); color: var(--neon); 
            width: 90px; padding: 2px 5px; font-size: 0.8rem; text-align: right;
        }
        .btn-primary { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .stat-card { border: 1px solid #004433; padding: 8px; background: rgba(0,255,204,0.03); margin-top: 5px; }
        .stat-label { font-size: 0.6rem; color: #555; }
        .stat-value { font-size: 1rem; font-weight: bold; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="sidebar">
        <h2 style="margin:0 0 15px 0; font-size: 0.9rem; letter-spacing: 2px;">V6.5 PARAMETERS</h2>
        
        <div class="input-group">
            <h3>PROPULSION & MASS</h3>
            <div class="control-row"><label>Engine Thrust (N)</label><input type="number" id="thrust" value="950000"></div>
            <div class="control-row"><label>Fuel Mass (kg)</label><input type="number" id="fuel" value="40000"></div>
            <div class="control-row"><label>Dry Rocket (kg)</label><input type="number" id="dry" value="10000"></div>
        </div>

        <div class="input-group">
            <h3>INITIAL VECTORS</h3>
            <div class="control-row"><label>Init Velocity (m/s)</label><input type="number" id="init_v" value="100"></div>
            <div class="control-row"><label>Launch Angle (°)</label><input type="number" id="init_angle" value="90"></div>
        </div>

        <div class="input-group">
            <h3>AERODYNAMICS</h3>
            <div class="control-row"><label>Drag Coeff (Cd)</label><input type="number" id="drag_cd" value="0.40" step="0.01"></div>
        </div>

        <div class="stat-card"><div class="stat-label">STATUS</div><div id="status" class="stat-value" style="color:yellow">STANDBY</div></div>
        <div class="stat-card"><div class="stat-label">ALTITUDE (m)</div><div id="alt" class="stat-value">0</div></div>
        <div class="stat-card"><div class="stat-label">VELOCITY (m/s)</div><div id="vel" class="stat-value">0</div></div>
        
        <button class="btn-primary" onclick="ignite()">ENGAGE IGNITION</button>
    </div>

    <div id="main-view">
        <div class="viewport-container" id="sky"><canvas id="flightCanvas"></canvas></div>
        <div class="chart-section"><canvas id="telemetryChart"></canvas></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    const telChartCtx = document.getElementById('telemetryChart').getContext('2d');
    const sky = document.getElementById('sky');

    let isRunning = false;
    let path = [];
    let state = {};

    const telChart = new Chart(telChartCtx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Velocity', data: [], borderColor: '#0fc', borderWidth: 1, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#111' } } }, plugins: { legend: { display: false } } }
    });

    function ignite() {
        if(isRunning) return;
        const angle = parseFloat(document.getElementById('init_angle').value) * (Math.PI / 180);
        const v0 = parseFloat(document.getElementById('init_v').value);
        
        state = {
            t:0, x:0, y:0, 
            vx: v0 * Math.cos(angle), vy: v0 * Math.sin(angle),
            thrust: parseFloat(document.getElementById('thrust').value),
            fuel: parseFloat(document.getElementById('fuel').value),
            dry: parseFloat(document.getElementById('dry').value),
            cd: parseFloat(document.getElementById('drag_cd').value),
            fuelFlow: 450 // kg/s
        };

        isRunning = true;
        path = [];
        telChart.data.labels = [];
        telChart.data.datasets[0].data = [];
        document.getElementById('status').innerText = "ASCENDING";
        document.getElementById('status').style.color = "#0fc";
        animate();
    }

    function animate() {
        if (!isRunning) return;
        const dt = 0.15;
        const EarthR = 6371000;
        const GM = 3.986e14;

        // --- Physics Logic ---
        let currentMass = state.dry + state.fuel;
        let speed = Math.sqrt(state.vx**2 + state.vy**2);
        
        // 1. Variable Gravity (Inverse Square Law)
        let gravity = GM / Math.pow(EarthR + state.y, 2);
        
        // 2. Atmospheric Density (Vanishes in Space)
        let rho = 1.225 * Math.exp(-state.y / 8500); 
        if (state.y > 100000) rho = 0; // Karman Line

        let drag = 0.5 * rho * speed**2 * state.cd * 4.5;
        let tForce = state.fuel > 0 ? state.thrust : 0;

        let ax = (tForce * (state.vx/speed) - drag * (state.vx/speed)) / currentMass;
        let ay = ((tForce * (state.vy/speed) - drag * (state.vy/speed)) / currentMass) - gravity;

        state.vx += ax * dt; state.vy += ay * dt; state.x += state.vx * dt; state.y += state.vy * dt; state.t += dt;
        if(state.fuel > 0) state.fuel -= state.fuelFlow * dt;

        // --- UI & Visuals ---
        document.getElementById('alt').innerText = Math.floor(state.y).toLocaleString();
        document.getElementById('vel').innerText = Math.floor(speed).toLocaleString();

        // Sky Color Transition
        let skyAlt = Math.min(state.y / 80000, 1);
        sky.style.background = `radial-gradient(circle at bottom, rgba(0,100,255,${1-skyAlt}) 0%, #000 100%)`;

        // Escape Check
        let escapeV = Math.sqrt(2 * GM / (EarthR + state.y));
        if (speed > escapeV) {
            document.getElementById('status').innerText = "ESCAPE ACHIEVED";
            document.getElementById('status').style.color = "#ff00ff";
        }

        // Draw Path
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        path.push({x: state.x, y: state.y});
        let maxX = Math.max(...path.map(p => p.x), 100); 
        let maxY = Math.max(...path.map(p => p.y), 100); 
        const pad = 50;
        const scale = Math.min((canvas.width - pad*2)/maxX, (canvas.height - pad*2)/maxY);

        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.beginPath();
        path.forEach((p, i) => {
            if(i === 0) ctx.moveTo(pad + p.x*scale, (canvas.height - pad) - p.y*scale);
            else ctx.lineTo(pad + p.x*scale, (canvas.height - pad) - p.y*scale);
        });
        ctx.stroke();

        if(Math.round(state.t * 10) % 10 === 0) {
            telChart.data.labels.push(state.t.toFixed(0));
            telChart.data.datasets[0].data.push(speed);
            telChart.update('none');
        }

        if(state.y < -10) { isRunning = false; document.getElementById('status').innerText = "IMPACT"; }
        if(state.t > 3000) { isRunning = false; document.getElementById('status').innerText = "OUT OF RANGE"; }
        if(isRunning) requestAnimationFrame(animate);
    }

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.onresize = resize; resize();
</script>
</body>
</html>
