<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAT-F | Interactive Mission Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #0b0e14; --panel: #151921; }
        body, html { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; 
        }
        #dashboard { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar Scrollable for inputs */
        #sidebar { 
            width: 350px; background: var(--panel); 
            border-right: 2px solid var(--neon); 
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
            overflow-y: auto;
        }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        
        .viewport-container { flex: 1.5; position: relative; border-bottom: 1px solid #333; min-height: 0; background: #000; }
        .chart-section { flex: 1; position: relative; padding: 10px; background: #080a0f; min-height: 0; }

        .input-group { margin-bottom: 15px; border: 1px solid #333; padding: 10px; border-radius: 4px; }
        .input-group h3 { font-size: 0.8rem; margin: 0 0 10px 0; color: #888; border-bottom: 1px solid #333; }
        
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .control-row label { font-size: 0.7rem; }
        .control-row input { 
            background: #000; border: 1px solid var(--neon); color: var(--neon); 
            width: 80px; padding: 2px 5px; font-family: monospace; 
        }

        .stat-card { border: 1px solid #004433; padding: 8px; margin-bottom: 5px; background: rgba(0,255,204,0.03); }
        .stat-label { font-size: 0.6rem; color: #888; }
        .stat-value { font-size: 1rem; font-weight: bold; }

        button { 
            background: var(--neon); color: #000; border: none; 
            padding: 15px; cursor: pointer; font-weight: bold; 
            margin-top: 10px; transition: 0.2s; position: sticky; bottom: 0;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="sidebar">
        <h2 style="margin:0 0 15px 0; font-size: 1rem; color: #fff;">CONFIG PANEL</h2>
        
        <div class="input-group">
            <h3>STAGE 1 (BOOSTER)</h3>
            <div class="control-row"><label>Thrust (N)</label><input type="number" id="s1_thrust" value="700000"></div>
            <div class="control-row"><label>Fuel Mass (kg)</label><input type="number" id="s1_fuel" value="30000"></div>
            <div class="control-row"><label>Dry Mass (kg)</label><input type="number" id="s1_dry" value="8000"></div>
        </div>

        <div class="input-group">
            <h3>STAGE 2 (ORBITER)</h3>
            <div class="control-row"><label>Thrust (N)</label><input type="number" id="s2_thrust" value="200000"></div>
            <div class="control-row"><label>Fuel Mass (kg)</label><input type="number" id="s2_fuel" value="10000"></div>
            <div class="control-row"><label>Dry Mass (kg)</label><input type="number" id="s2_dry" value="2000"></div>
        </div>

        <div class="input-group">
            <h3>INITIAL VECTORS</h3>
            <div class="control-row"><label>Init Vel (m/s)</label><input type="number" id="init_v" value="100"></div>
            <div class="control-row"><label>Launch Angle (°)</label><input type="number" id="init_angle" value="85"></div>
        </div>

        <div class="input-group">
            <h3>AERO FACTORS</h3>
            <div class="control-row"><label>Drag Coeff (Cd)</label><input type="number" id="drag_cd" value="0.45" step="0.01"></div>
        </div>

        <div class="stat-card"><div class="stat-label">ALTITUDE</div><div id="alt" class="stat-value">0 m</div></div>
        <div class="stat-card"><div class="stat-label">VELOCITY</div><div id="vel" class="stat-value">0 m/s</div></div>
        
        <button onclick="ignite()">EXECUTE SIMULATION</button>
    </div>

    <div id="main-view">
        <div class="viewport-container"><canvas id="flightCanvas"></canvas></div>
        <div class="chart-section"><canvas id="telemetryChart"></canvas></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    const telChartCtx = document.getElementById('telemetryChart').getContext('2d');

    let isRunning = false;
    let path = [];
    let config = {}; // Global simulation parameters

    const telChart = new Chart(telChartCtx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Velocity', data: [], borderColor: '#0fc', borderWidth: 2, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#222' } } }, plugins: { legend: { display: false } } }
    });

    function ignite() {
        if(isRunning) return;
        
        // 1. Read Inputs from DOM
        const v0 = parseFloat(document.getElementById('init_v').value);
        const angle = parseFloat(document.getElementById('init_angle').value) * (Math.PI / 180);
        
        config = {
            s1: { thrust: parseFloat(document.getElementById('s1_thrust').value), fuel: parseFloat(document.getElementById('s1_fuel').value), dry: parseFloat(document.getElementById('s1_dry').value), flow: parseFloat(document.getElementById('s1_fuel').value)/60 },
            s2: { thrust: parseFloat(document.getElementById('s2_thrust').value), fuel: parseFloat(document.getElementById('s2_fuel').value), dry: parseFloat(document.getElementById('s2_dry').value), flow: parseFloat(document.getElementById('s2_fuel').value)/100 },
            cd: parseFloat(document.getElementById('drag_cd').value),
            state: { t:0, x:0, y:0, vx: v0 * Math.cos(angle), vy: v0 * Math.sin(angle), stage: 1 }
        };

        isRunning = true;
        path = [];
        telChart.data.labels = [];
        telChart.data.datasets[0].data = [];
        animate();
    }

    function animate() {
        if (config.state.y < 0 && config.state.t > 1) { isRunning = false; return; }

        const dt = 0.1;
        const s = config.state;
        
        // Physics logic using user inputs
        let currentMass = config.s2.dry + config.s2.fuel + (s.stage === 1 ? config.s1.dry + config.s1.fuel : 0);
        let thrust = s.stage === 1 ? config.s1.thrust : (config.s2.fuel > 0 ? config.s2.thrust : 0);
        
        let speed = Math.sqrt(s.vx**2 + s.vy**2);
        let rho = 1.225 * Math.exp(-s.y / 8500); 
        let drag = 0.5 * rho * speed**2 * config.cd * (s.stage === 1 ? 4.5 : 2.0);

        let ax = (thrust * (s.vx/speed) - drag * (s.vx/speed)) / currentMass;
        let ay = (thrust * (s.vy/speed) - drag * (s.vy/speed) - (9.8 * currentMass)) / currentMass;

        s.vx += ax * dt; s.vy += ay * dt; s.x += s.vx * dt; s.y += s.vy * dt; s.t += dt;

        if(s.stage === 1) { config.s1.fuel -= config.s1.flow * dt; if(config.s1.fuel <= 0) s.stage = 2; }
        else if(config.s2.fuel > 0) config.s2.fuel -= config.s2.flow * dt;

        // UI & Scaling
        document.getElementById('alt').innerText = Math.floor(s.y) + " m";
        document.getElementById('vel').innerText = Math.floor(speed) + " m/s";

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        path.push({x: s.x, y: s.y});
        
        let maxX = Math.max(...path.map(p => p.x), 100); 
        let maxY = Math.max(...path.map(p => p.y), 100); 
        const padding = 50;
        const scale = Math.min((canvas.width - padding*2)/maxX, (canvas.height - padding*2)/maxY);

        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.beginPath();
        path.forEach((p, i) => {
            const dx = padding + (p.x * scale);
            const dy = (canvas.height - padding) - (p.y * scale);
            if(i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
        });
        ctx.stroke();

        if(Math.round(s.t * 10) % 5 === 0) {
            telChart.data.labels.push(s.t.toFixed(1));
            telChart.data.datasets[0].data.push(speed);
            telChart.update('none');
        }

        if(isRunning) requestAnimationFrame(animate);
    }

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.onresize = resize; resize();
</script>
</body>
</html>
