<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAT-F | Mission Control (Debugged)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #0b0e14; --panel: #151921; }
        
        /* Locking the viewport so it never scrolls */
        body, html { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; 
        }

        #dashboard { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar { 
            width: 320px; background: var(--panel); 
            border-right: 2px solid var(--neon); 
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        #main-view { 
            flex-grow: 1; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }

        /* Essential Fix: position: relative and min-height: 0 prevents the infinite growth loop */
        .viewport-container { 
            flex: 2; position: relative; 
            border-bottom: 1px solid #333; 
            min-height: 0; 
        }

        .chart-section { 
            flex: 1; position: relative; 
            padding: 15px; background: #080a0f; 
            min-height: 0; 
        }

        .stat-card { border: 1px solid #004433; padding: 12px; margin-bottom: 10px; background: rgba(0,255,204,0.03); }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.3rem; font-weight: bold; }

        canvas { display: block; width: 100% !important; height: 100% !important; }

        button { 
            background: var(--neon); color: #000; border: none; 
            padding: 15px; cursor: pointer; font-weight: bold; 
            margin-top: auto; transition: 0.2s;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="sidebar">
        <h2 style="margin-top:0;">HAT-F v6.0</h2>
        <div class="stat-card"><div class="label">Status</div><div id="status" class="value" style="color:yellow;">READY</div></div>
        <div class="stat-card"><div class="label">Altitude</div><div id="alt" class="value">0</div></div>
        <div class="stat-card"><div class="label">Velocity</div><div id="vel" class="value">0</div></div>
        <button onclick="ignite()">ENGAGE LAUNCH</button>
    </div>

    <div id="main-view">
        <div class="viewport-container">
            <canvas id="flightCanvas"></canvas>
        </div>
        <div class="chart-section">
            <canvas id="telemetryChart"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    const telChartCtx = document.getElementById('telemetryChart').getContext('2d');

    let isRunning = false;
    let state = { t:0, x:0, y:0, vx:12, vy:95, m1:30000, m2:10000, stage:1 };
    let path = [];

    // Chart.js Configuration
    const telChart = new Chart(telChartCtx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Velocity (m/s)', data: [], borderColor: '#00ffcc', borderWidth: 2, pointRadius: 0, fill: false }] },
        options: {
            responsive: true,
            maintainAspectRatio: false, // Critically important for stationary behavior
            animation: false, // Performance boost for live tracking
            scales: {
                x: { display: true, grid: { color: '#111' }, ticks: { display: false } },
                y: { grid: { color: '#222' }, ticks: { color: '#888' } }
            },
            plugins: { legend: { display: false } }
        }
    });

    function ignite() {
        if(isRunning) return;
        isRunning = true;
        state = { t:0, x:0, y:0, vx:12, vy:95, m1:30000, m2:10000, stage:1 };
        path = [];
        telChart.data.labels = [];
        telChart.data.datasets[0].data = [];
        document.getElementById('status').innerText = "IN FLIGHT";
        animate();
    }

    function animate() {
        if (state.y < 0 && state.t > 1) {
            isRunning = false;
            document.getElementById('status').innerText = "IMPACT DETECTED";
            return;
        }

        // --- Optimized Physics Module ---
        const dt = 0.1;
        const totalMass = 12000 + (state.stage === 1 ? 28000 + state.m1 : state.m2);
        const thrust = state.stage === 1 ? 680000 : (state.m2 > 0 ? 190000 : 0);
        const speed = Math.sqrt(state.vx**2 + state.vy**2);
        const rho = 1.225 * Math.exp(-state.y / 8500); 
        const drag = 0.5 * rho * speed**2 * 0.4 * (state.stage === 1 ? 4.5 : 2.0);

        const ax = (thrust * (state.vx/speed) - drag * (state.vx/speed)) / totalMass;
        const ay = (thrust * (state.vy/speed) - drag * (state.vy/speed) - (9.8 * totalMass)) / totalMass;

        state.vx += ax * dt; state.vy += ay * dt; state.x += state.vx * dt; state.y += state.vy * dt; state.t += dt;
        
        if(state.stage === 1) { state.m1 -= 450 * dt; if(state.m1 <= 0) state.stage = 2; }
        else if(state.m2 > 0) state.m2 -= 90 * dt;

        // --- UI Updates ---
        document.getElementById('alt').innerText = Math.floor(state.y) + " m";
        document.getElementById('vel').innerText = Math.floor(speed) + " m/s";

        // --- Stationary Drawing ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 2;
        path.push({x: state.x, y: state.y});
        
        ctx.beginPath();
        const scale = 0.015; // Adjustment to keep flight in view
        path.forEach((p, i) => {
            const drawX = 50 + (p.x * scale);
            const drawY = (canvas.height - 50) - (p.y * scale);
            if(i === 0) ctx.moveTo(drawX, drawY); else ctx.lineTo(drawX, drawY);
        });
        ctx.stroke();

        // Update Chart every 5 frames to keep UI smooth and stationary
        if(Math.round(state.t * 10) % 5 === 0) {
            telChart.data.labels.push(state.t.toFixed(1));
            telChart.data.datasets[0].data.push(speed);
            telChart.update('none'); // 'none' skips expensive animations
        }

        if(isRunning) requestAnimationFrame(animate);
    }

    function syncCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', syncCanvas);
    syncCanvas();
</script>

</body>
</html>
